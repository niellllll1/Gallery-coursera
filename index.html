<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Photo Gallery | Portfolio Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Interactive Experience Gallery</h1>
        <p>A demonstration of DOM manipulation and event handling</p>
    </header>

    <div id="image">
        Hover over an image below to display here.
    </div>

    <div class="gallery-container">
        
        <img class="preview" 
             alt="Serene Mountain Landscape" 
             src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b" 
             onmouseover="upDate(this)" 
             onmouseleave="unDo()">

        <img class="preview" 
             alt="Urban City Lights at Night" 
             src="https://images.unsplash.com/photo-1477959858617-67f85cf4f1df" 
             onmouseover="upDate(this)" 
             onmouseleave="unDo()">

        <img class="preview" 
             alt="Coastal Ocean Waves" 
             src="https://images.unsplash.com/photo-1505118380757-91f5f45d8de4" 
             onmouseover="upDate(this)" 
             onmouseleave="unDo()">

        <img class="preview" 
             alt="Dense Tropical Forest" 
             src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e" 
             onmouseover="upDate(this)" 
             onmouseleave="unDo()">
             
    </div>

    <script src="script.js"></script>
</body>
</html>
