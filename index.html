<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interstellar Gallery | Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="gallery-header">
        <h1>Interstellar Experience</h1>
        <p>Explore the cosmos by hovering over the previews below</p>
    </header>

    <div id="image">
        Hover over an image below to display here.
    </div>

    <div class="preview-container">
        <img class="preview" 
             alt="Deep Space Nebula" 
             src="https://images.unsplash.com/photo-1614728894747-a83421e2b9c9" 
             onmouseover="upDate(this)" 
             onmouseleave="unDo()">

        <img class="preview" 
             alt="The Milky Way Core" 
             src="https://images.unsplash.com/photo-1419242902214-272b3f66ee7a" 
             onmouseover="upDate(this)" 
             onmouseleave="unDo()">

        <img class="preview" 
             alt="Supernova Remnant" 
             src="https://images.unsplash.com/photo-1543722530-d2c3201371e7" 
             onmouseover="upDate(this)" 
             onmouseleave="unDo()">

        <img class="preview" 
             alt="Andromeda Horizon" 
             src="https://images.unsplash.com/photo-1462331940025-496dfbfc7564" 
             onmouseover="upDate(this)" 
             onmouseleave="unDo()">
    </div>

    <script src="script.js"></script>
</body>
</html>
